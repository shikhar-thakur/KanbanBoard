<mat-card class="example-card">
    <mat-card-title style="text-align:center;text-transform: uppercase;">{{task.taskTitle}}</mat-card-title>
    <hr>
    Assigined to: &nbsp;<mat-card-subtitle >{{task.taskAssignee.userName}}</mat-card-subtitle>
    <mat-card-actions>
        <button  class="buttondel" style="padding-left: 4em;padding-right:4em" (click)="deleteTask(task.taskId)"><img src="https://img.icons8.com/ios-glyphs/18/000000/trash--v1.png"/></button>
    </mat-card-actions>
  </mat-card>
